name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting, clippy (no Metal), and Python lint — fast feedback on Linux.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # dtolnay/rust-toolchain does not read rust-toolchain.toml; the explicit
      # input keeps the action's install in lockstep with the repo pin (the
      # rustup directory override would enforce the pin on every cargo call
      # regardless, but implicitly — this makes it visible in the step log).
      # Bump together with rust-toolchain.toml + workspace rust-version
      # (see rust-toolchain.toml for the bump protocol, rust-lang/rust#158830).
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      # version pinned (like every other toolchain here): an unpinned
      # setup-uv resolves "latest release" via the GitHub REST API at job
      # runtime, which both floats the tool and adds an availability
      # dependency — the 2026-07-16 "Degraded REST API Availability"
      # incident failed this exact call (runs 29540215158/29540167586).
      # Bump deliberately, together with the test-macos copy below.
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"
      - run: uv sync --project python/kiln_worker_py
      - run: uv run --project python/kiln_worker_py ruff check python/ tests/e2e scripts
      - run: uv run --project python/kiln_worker_py ruff format --check python/ tests/e2e scripts

  # Linux compile-check without Metal (SPEC §3): no mlx-c build.
  compile-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1 # lockstep with rust-toolchain.toml (see lint job)
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --workspace --no-default-features

  # Release-mode workspace tests on Apple Silicon. Debug-only coverage let
  # a release-only use-after-free (a rustc MIR-GVN by-value-argument merge
  # miscompiling the lazy sampler key; PROGRESS 2026-07-05) go undetected:
  # optimized builds are what ship and what every benchmark number in
  # ADR 0003 was measured on, so they get their own test lane.
  test-macos-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1 # lockstep with rust-toolchain.toml (see lint job)
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: brew install protobuf
      - name: Cache mlx-c build tree
        uses: actions/cache@v4
        with:
          path: target/mlx-c-build
          key: mlx-c-build-${{ runner.os }}-${{ hashFiles('crates/kiln-mlx/vendor/mlx-c/CMakeLists.txt', 'crates/kiln-mlx/build.rs') }}
      - run: cargo test --workspace --release
      # Packaging shapes that CI *can* check (SPEC §12 Phase 10). The real
      # gate — `brew install --build-from-source ./Formula/kiln.rb` → serve
      # → completion — is a full pinned-toolchain download + release build
      # + venv sync (~30 min, needs developer-mode brew and a Metal
      # compiler): manual-verify-only, performed and recorded in
      # PROGRESS.md at the Phase 10 closeout.
      - name: Packaging lint (Homebrew formula + launchd plist)
        run: |
          HOMEBREW_DEVELOPER=1 brew style --formula Formula/kiln.rb
          plutil -lint packaging/dev.kiln.gateway.plist

  # Full build + tests on Apple Silicon, including the vendored mlx-c build.
  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1 # lockstep with rust-toolchain.toml (see lint job)
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: brew install protobuf
      - name: Cache mlx-c build tree
        uses: actions/cache@v4
        with:
          path: target/mlx-c-build
          key: mlx-c-build-${{ runner.os }}-${{ hashFiles('crates/kiln-mlx/vendor/mlx-c/CMakeLists.txt', 'crates/kiln-mlx/build.rs') }}
      # The pinned revisions/sha256s live in fetch-test-model.sh, so hashing the
      # script keys the cache to the pins: a pin bump invalidates the cache.
      # Fetched BEFORE any test step: the model-gated steps below and the
      # pytest steps at the end both read from it.
      - name: Cache pinned test models
        id: test-models
        uses: actions/cache@v4
        with:
          path: ~/.kiln/test-models
          key: test-models-${{ hashFiles('scripts/fetch-test-model.sh') }}
      # timeout-minutes backstops what the script's own stall detector can't
      # see (a connection trickling bytes too slowly to ever finish; run
      # 29305594680 attempt 1 hung here 1h42m). Observed cold-cache fetches
      # take 4-13 min on this runner; 30 min is >2x the slowest observed and
      # well under the 6 h job limit.
      - name: Fetch pinned test models
        if: steps.test-models.outputs.cache-hit != 'true'
        timeout-minutes: 30
        run: ./scripts/fetch-test-model.sh
      - run: cargo build --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Deliberately env-less: the KILN_TEST_MODELS-gated suites skip here
      # and run in the two dedicated steps below (PROGRESS 2026-07-05,
      # Option B ruling).
      - run: cargo test --workspace
      # Model-gated integration tier (SPEC §11.3), split per the Option B
      # ruling: suites asserting device-independent invariants (same-device
      # warm-vs-cold, pressured-vs-solo, engine-vs-contiguous, leak
      # counters, RPC semantics) gate the job. KILN_FIXTURE_PARITY=skip
      # carves the committed-fixture comparisons out of the mixed suites
      # (preemption, prefill_pad; for spec_decode it swaps the committed-
      # fixture baselines for a live speculation-off run — the
      # device-independent SPEC §6.5 on-vs-off invariant, blocking under
      # the ADR 0005 envelope); dev-machine runs leave it unset and run
      # everything.
      - name: Model-gated suites (device-independent, blocking)
        run: |
          export KILN_TEST_MODELS="$HOME/.kiln/test-models"
          export KILN_FIXTURE_PARITY=skip
          cargo test -p kiln-tokenize --test tokenizer --test detok --test toolcall_fixtures
          cargo test -p kiln-engine --test grammar
          cargo test -p kiln-models --test batching --test calibration \
            --test draft --test leak --test leak_batched --test preemption \
            --test prefill_pad --test prefix_cache --test prefix_multiturn \
            --test spec_decode
          cargo test -p kiln-worker --test rpc --test grammar --test draft
      # PERMANENTLY advisory (ADR 0004): golden bit-exactness is a
      # same-device bar bound to the fixture-generating device class;
      # token-id equality on this runner's paravirtual GPU is explicitly
      # not a correctness bar. Never promote this step to blocking. A
      # CHANGE in its failure pattern alongside a code change is signal
      # worth a PROGRESS note; red alone is not.
      - name: Golden parity vs committed fixtures (advisory, cross-device)
        continue-on-error: true
        run: |
          export KILN_TEST_MODELS="$HOME/.kiln/test-models"
          status=0
          cargo test -p kiln-models --test golden -- --nocapture || status=1
          KILN_FIXTURE_PARITY=only cargo test -p kiln-models \
            --test preemption --test prefill_pad -- --nocapture || status=1
          exit $status
      - name: Smoke test (Phase 0 acceptance)
        run: |
          out=$(cargo run -p kiln-mlx --example smoke)
          echo "smoke output: $out"
          test "$out" = "3.0"
      # Pinned in lockstep with the lint job's copy (see comment there).
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"
      - run: uv sync --project python/kiln_worker_py
      - name: Python proto codegen is current
        run: |
          uv run --project python/kiln_worker_py python -m grpc_tools.protoc -Iproto \
            --python_out=python/kiln_worker_py/src/kiln_worker_py/gen \
            --grpc_python_out=python/kiln_worker_py/src/kiln_worker_py/gen \
            proto/kiln/v1/worker.proto
          git diff --exit-code python/kiln_worker_py/src/kiln_worker_py/gen
      - name: Python worker tests
        run: |
          export KILN_TEST_MODELS="$HOME/.kiln/test-models"
          uv run --project python/kiln_worker_py pytest python/kiln_worker_py/tests -v
      # The jobs venv (SPEC §9.1): mlx_lm convert for kiln-jobs quantize.
      - run: uv sync --project python/kiln_jobs_py
      # Real quantization on the runner: BF16 SmolLM2 -> 4-bit affine via the
      # jobs venv, output verified through kiln-models config parsing. The
      # download/resume suite needs no gating — it runs against a local stub
      # hub inside `cargo test --workspace` above.
      - name: kiln-jobs quantize (real mlx_lm convert, BF16 -> 4-bit)
        run: |
          export KILN_TEST_MODELS="$HOME/.kiln/test-models"
          cargo test -p kiln-jobs --test quantize -- --nocapture
      # Admin UI (SPEC §12 Phase 10): built once here — debug gateways read
      # admin/build from disk at runtime, so only the e2e steps need it.
      # Cheap: setup-node ~5s, npm ci ~20s (cached thereafter), vite build
      # ~2s on a 1-page app — noise against this job's ~1h runtime.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - name: Build admin UI
        run: npm ci --prefix admin && npm run build --prefix admin
      - run: uv sync --project tests/e2e
      # The admin-UI flow test drives the runner image's Google Chrome (no
      # download); the fallback install only runs if the image drops it.
      - name: Ensure a browser for the admin UI e2e
        run: |
          if [ ! -d "/Applications/Google Chrome.app" ]; then
            uv run --project tests/e2e playwright install chromium
          fi
      - name: E2E suite (full stacks; openai + anthropic SDKs + admin UI browser flow)
        run: |
          export KILN_TEST_MODELS="$HOME/.kiln/test-models"
          # The browser-driven admin UI test must run, not skip (its skip
          # path is for dev machines without any automatable browser).
          export KILN_E2E_REQUIRE_BROWSER=1
          uv run --project tests/e2e pytest tests/e2e -v
      # Phase 9 closeout (SPEC §11.3): the 30-minute full-stack mixed-load
      # soak — leak gates (RSS slope, mlx live-object counter) + periodic
      # greedy-determinism canaries under sustained multi-tenant pressure.
      # BLOCKING by decision: the ~30 extra minutes per PR are an accepted
      # tradeoff at this stage (PROGRESS 2026-07-15); do not move this to a
      # scheduled/nightly workflow without a PM ruling. Debug binaries on
      # purpose — the live-object counter is compiled out of release.
      - name: Full-stack soak (30 min mixed load, SPEC §11.3, blocking)
        timeout-minutes: 55
        run: |
          export KILN_TEST_MODELS="$HOME/.kiln/test-models"
          ./scripts/soak.sh --minutes 30
